<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cineflow Account Portal</title>
</head>
<body>
    <header>
        <h1>Join the CineFlow Creator Program</h1>
    </header>
    <main>
        <section id="promo">
            <h1>Welcome Video</h1>
            <video src="videos/promo.mp4" controls width="200" height="200"></video><hr>

        </section>
     <section id="registration">
         <form action="action_page.php" method="post" enctype="multipart/form-data">
            <fieldset>
            <legend>Personal information</legend>
             <div class="form-group">
                 <label for="fname">Full Name (Required):</label>
                 <input type="text" id="fname" placeholder="e.g. , John Mwangi" pattern="[a-zA-Z0-9]+" required>
             </div>
             <div class="form-group">
                 <label for="email">Email address:</label>
                 <input type="email" id="email" placeholder="e.g. , johnmwangi@gmail.com" required>
             </div>
                 <div class="form-group">
                     <label for="password">Password (Required):</label>
                     <input type="password" id="password" placeholder="*********" required minlength="8">
                 </div>
                 <div class="form-group">
                     <label for="dob">Date of Birth:</label>            
                    <input type="date" id="dob" required max="2008-04-25">
                 </div>
            </fieldset>
            <fieldset>
                <legend>Channel Details</legend>
                <div class="form-group">
                    <label for="profile-pic">Profile picture(Only .jpg and .png are accepted)</label>
                    <input type="file" id="profile-pic" accept="image">
                </div>
                <div class="form-group">
                    <label for="range">Expected weekly upload volume(0-10)</label>
                    <input type="range" id="range">
                </div>
                <label for="checkbox">
                    <input type="checkbox" id="checkbox">Lifestyle
                </label>
                <label for="checkbox">
                    <input type="checkbox" id="checkbox">Gaming
                </label>
                <label for="checkbox">
                    <input type="checkbox" id="checkbox">Tech
                </label>
            </fieldset>
            <div class="form-group">
                <button type="submit">Register Account</button>
                <button type="reset">Clear Form</button>
            </div>
         </form>
     </section> 
    </main>
    
</body>
</html>
